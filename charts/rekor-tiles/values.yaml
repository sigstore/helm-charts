# Default values for rekor-tiles.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  flavor: gcp  # Must be gcp, posix, aws, or gcpcloudsql
  registry: ghcr.io
  repository: sigstore/rekor-tiles
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  version: v2.2.1
  # crane digest ghcr.io/sigstore/rekor-tiles/gcp:v2.3.0
  gcpSHA: sha256:e401cfe033c99ec4ac647f61f51dd1c28d686c227d6c6e250a50a110da3a1559
  # crane digest ghcr.io/sigstore/rekor-tiles/posix:v2.3.0
  posixSHA: sha256:a5ceeff41b2468f965f7259685a9553c6dbba6870108ffebfa6584df5ae22504
  # crane digest ghcr.io/sigstore/rekor-tiles/aws:v2.3.0
  awsSHA: sha256:f403632566bfda42a7ea3904097be4fd1eff907831ec14a11df7f9550c3e2fbc
  # crane digest ghcr.io/sigstore/rekor-tiles/gcpcloudsql:v2.3.0
  gcpcloudsqlSHA: sha256:76c8e0f82c15f787e6d358dbf1f00a1e3dc6fbd7719ddec9f56550edd9d22c41

namespace:
  create: false
  name: rekor-tiles-system

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65533

service:
  type: ClusterIP
  ports:
    - name: 3000-tcp
      port: 80
      protocol: TCP
      targetPort: 3000
    - name: 3001-tcp
      port: 3001
      protocol: TCP
      targetPort: 3001
    - name: metrics
      port: 2112
      protocol: TCP
      targetPort: 2112

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: 3000
readinessProbe:
  httpGet:
    path: /healthz
    port: 3000

terminationGracePeriodSeconds: 65
lifecycle:
  preStop:
    exec:
      command: ["sleep", "15"]

nodeSelector:
  iam.gke.io/gke-metadata-server-enabled: "true"   # support workload identity

tolerations: []

affinity: {}

neg:
  http:
    name: ""
    port: 80
  grpc:
    name: ""
    port: 3001

# Server arguments
server:
  antispam: {}
  tesseraLivecycle: {}
  gcp: {}
    # spanner: projects/{projectId}/instances/{instanceId}/databases/{databaseId}
    # bucket: rekor-tiles-bucket
  gcpcloudsql: {}
    # cloudsqlDsn: user:password@tcp(127.0.0.1:3306)/rekor
    # bucket: rekor-tiles-bucket
  aws: {}
    # bucket: rekor-tiles-bucket
    # mysqlDsn: user:password@tcp(127.0.0.1:3306)/rekor
    # maxOpenConns: 100
    # maxIdleConns: 10
  posix: {}
    # storageDir:
    #   path: /storage
    #   name: ctlog
    #   volume:
    #     hostPath:
    #       path: /data/rekor-tiles-storage
    #       type: Directory
  grpc:
    port: "3001"
  hostname: "localhost"
  http:
    port: "3000"
    metricsPort: "2112"
  serverConfig: {}
  readOnly: false
  grpcSvcTLS: {}
  signer: {}  # posix supports file, gcp supports file, kms, and tink
    # file:
    #   path: /pki/signer.pem
    #   withPassword: false
    #   secret:
    #     name: "signing-key"
    #     key: signing-key
    #     mountPath: /pki
    #     mountSubPath: signer.pem
    # kms:
    #   hash: sha256
    #   key: gcpkms://keyname
    # tink:
    #   kekURI: gcp-kms://keyname
    #   configMapName: tink-config
    #   keyset: ""
  witnessing: {}
    # configMapName: witness-config
    # witnessPolicy: ""
  extraArgs: []
